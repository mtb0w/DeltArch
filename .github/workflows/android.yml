name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Allows you to manually click "Run workflow" on GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Make Gradle Executable
      run: chmod +x ./gradlew

    # CHANGED: Targeted the specific build flavors used by this project
    - name: Build Debug APKs
      run: ./gradlew :lemuroid-app:assembleFreeDynamicDebug :lemuroid-app:assemblePlayDynamicDebug

    - name: Upload Standard APKs
      uses: actions/upload-artifact@v4
      with:
        name: lemuroid-apks
        path: "lemuroid-app/build/outputs/apk/**/*.apk"

    - name: Upload Android App Bundles (AAB)
      uses: actions/upload-artifact@v4
      with:
        name: lemuroid-bundles
        path: "lemuroid-app/build/outputs/bundle/**/*.aab"
